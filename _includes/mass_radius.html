dChild(link);\n\n    // wait for the link to be added to the document\n    window.requestAnimationFrame(function() {\n      var event = new MouseEvent('click');\n      link.dispatchEvent(event);\n      document.body.removeChild(link);\n    });\n    "}}]]]},"styles":{"type":"map","entries":[["margin","auto 5px"]]},"label":"Download CSV of Selected Data"}},{"type":"object","name":"Div","id":"p1175","attributes":{"styles":{"type":"map","entries":[["margin","auto -3px auto 5px"]]},"text":"Transit:"}},{"type":"object","name":"ColorPicker","id":"p1176","attributes":{"js_property_callbacks":{"type":"map","entries":[["change:color",[{"type":"object","name":"CustomJS","id":"p1177","attributes":{"args":{"type":"map","entries":[["other",{"type":"object","name":"Scatter","id":"p1063","attributes":{"x":{"type":"field","field":"mass"},"y":{"type":"field","field":"radius"},"size":{"type":"value","value":8},"line_color":{"type":"value","value":"#228833"},"line_alpha":{"type":"value","value":0.2},"fill_color":{"type":"value","value":"#228833"},"fill_alpha":{"type":"value","value":0.2},"hatch_color":{"type":"value","value":"#228833"},"hatch_alpha":{"type":"value","value":0.2}}}]]},"code":"other.fill_color = this.color"}},{"type":"object","name":"CustomJS","id":"p1178","attributes":{"args":{"type":"map","entries":[["other",{"id":"p1063"}]]},"code":"other.hatch_color = this.color"}},{"type":"object","name":"CustomJS","id":"p1179","attributes":{"args":{"type":"map","entries":[["other",{"id":"p1063"}]]},"code":"other.line_color = this.color"}},{"type":"object","name":"CustomJS","id":"p1180","attributes":{"args":{"type":"map","entries":[["other",{"type":"object","name":"Scatter","id":"p1065","attributes":{"x":{"type":"field","field":"mass"},"y":{"type":"field","field":"radius"},"size":{"type":"value","value":8},"line_color":{"type":"value","value":"#228833"},"line_alpha":{"type":"value","value":0.2},"fill_color":{"type":"value","value":"#228833"},"fill_alpha":{"type":"value","value":0.2},
