 = keys[jj];\n                    var ind = source.selected.indices[ii];\n                    row.push(source.data[column][ind].toString());\n                }\n                lines.push(row.join(', '));\n            }\n        }\n        return lines.join('\\n').concat('\\n');\n    };\n\n    // adapted from:\n    // https://stackoverflow.com/questions/21012580/is-it-possible-to-write-\n    // data-to-file-using-only-javascript\n    var textFile = null;\n    function makeTextFile(text) {\n      var data = new Blob([text], {type: 'text/plain'});\n\n      // If we are replacing a previously generated file we need to\n      // manually revoke the object URL to avoid memory leaks.\n      if (textFile !== null) {\n        window.URL.revokeObjectURL(textFile);\n      }\n\n      textFile = window.URL.createObjectURL(data);\n\n      return textFile;\n    };\n\n    var link = document.createElement('a');\n    // link.setAttribute('download', 'exoplots_download.txt');\n    link.setAttribute('target', '_blank');\n    link.href = makeTextFile(makeCSV(sources, keys, header));\n    document.body.appendChild(link);\n\n    // wait for the link to be added to the document\n    window.requestAnimationFrame(function() {\n      var event = new MouseEvent('click');\n      link.dispatchEvent(event);\n      document.body.removeChild(link);\n    });\n    "}}]]]},"styles":{"type":"map","entries":[["margin","auto 5px"]]},"label":"Download CSV of Selected Data"}},{"type":"object","name":"Div","id":"p1132","attributes":{"styles":{"type":"map","entries":[["margin","auto -3px auto 5px"]]},"text":"Kepler:"}},{"type":"object","name":"ColorPicker","id":"p1133","attributes":{"js_property_callbacks":{"type":"map","entries":[["change:color",[{"type":"object","name":"CustomJS","id":"p1134","attributes":{"args":{"type":"map","entries":[["other",{"type":"object","name":"Scatter","id":"p1057","attributes":{"x":{"type":"field","field":"period"},"y":{"type":"field","field":"radius"},"size":{"type":"value",
